{% extends 'base/base.html' %}

{% block content %}
<h2>{% if order %}Редактирование заказа{% else %}Создание заказа{% endif %}</h2>

<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Товар</label>
        <select name="product" class="form-select" required>
            {% for product in products %}
            <option value="{{ product.pk }}" {% if order.product.pk == product.pk %}selected{% endif %}>
                {{ product.name }} - {{ product.final_price }} руб.
            </option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Количество</label>
        <input type="number" name="quantity" class="form-control" value="{{ order.quantity|default:1 }}" min="1" required>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% url 'orders:order_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
